<div class="form-wrapper">
  <div class="container">
    <div class="form-card">

      <div class="form-header">
        <div>
          <h2 class="form-title">Editar tarea</h2>
          <p class="form-subtitle">Modifica la información de la tarea seleccionada</p>
        </div>
        <button class="btn btn-secondary" routerLink="/tareas">← Volver</button>
      </div>

      <hr class="form-divider">

      <div class="field-group">
        <label class="field-label">Título</label>
        <input
          type="text"
          class="field-input"
          [(ngModel)]="titulo">
      </div>

      <div class="field-group">
        <label class="field-label">Descripción</label>
        <textarea
          class="field-textarea"
          rows="5"
          [(ngModel)]="descripcion">
        </textarea>
      </div>

      <div class="field-row">
        <div class="field-group">
          <label class="field-label">Estado</label>
          <select class="field-select" [(ngModel)]="estado">
            <option value="PENDIENTE">Pendiente</option>
            <option value="EN_PROGRESO">En progreso</option>
            <option value="COMPLETADO">Completado</option>
          </select>
        </div>
        <div class="field-group">
          <label class="field-label">Prioridad</label>
          <select class="field-select" [(ngModel)]="prioridad">
            <option value="BAJA">Baja</option>
            <option value="MEDIA">Media</option>
            <option value="ALTA">Alta</option>
          </select>
        </div>
      </div>

      <div class="form-actions">
        <button class="btn btn-secondary" routerLink="/tareas">Cancelar</button>
        <button class="btn btn-primary" (click)="guardar()">Guardar cambios</button>
      </div>

    </div>
  </div>
</div>
