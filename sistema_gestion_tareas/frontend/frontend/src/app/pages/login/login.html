<div class="login-wrapper d-flex align-items-center justify-content-center">
  <div class="container">
    <div class="row justify-content-center">
      <div class="col-md-5 col-lg-4">
        
        <div class="card login-card border-0 shadow-lg">
          <div class="card-body p-4 p-md-5">
            
            <div class="text-center mb-4">
              <div class="brand-icon mb-3 mx-auto d-flex align-items-center justify-content-center">
                <svg height="32" viewBox="0 0 16 16" width="32" fill="currentColor">
                  <path d="M8 0c4.42 0 8 3.58 8 8a8.013 8.013 0 0 1-5.45 7.59c-.4.08-.55-.17-.55-.38 0-.27.01-1.13.01-2.2 0-.75-.25-1.23-.54-1.48 1.78-.2 3.65-.88 3.65-3.95 0-.88-.31-1.59-.82-2.15.08-.2.36-1.02-.08-2.12 0 0-.67-.22-2.2.82A7.48 7.48 0 0 0 8 2.51c-.68 0-1.36.09-2 .28-1.52-1.04-2.2-.82-2.2-.82-.44 1.1-.16 1.92-.08 2.12-.51.56-.82 1.28-.82 2.15 0 3.06 1.86 3.75 3.64 3.95-.23.2-.44.55-.51 1.07-.46.21-1.61.55-2.33-.66-.15-.24-.6-.83-1.23-.82-.67.01-.27.38.01.53.34.16.73.72.82 1.13.16.45.68 1.31 2.69.94 0 .67.01 1.3.01 1.49 0 .21-.15.45-.55.38A7.995 7.995 0 0 1 0 8c0-4.42 3.58-8 8-8Z"></path>
                </svg>
              </div>
              <h3 class="login-title fw-bold">GitTask Manager</h3>
              <p class="text-muted small">Gestiona tus issues de GitHub con fluidez</p>
            </div>

            <form (ngSubmit)="iniciarSesion()">
              
              <div class="mb-3">
                <label class="form-label custom-label">Correo electrónico</label>
                <div class="input-group-custom">
                  <input
                    type="email"
                    class="form-control custom-input"
                    placeholder="nombre@ejemplo.com"
                    [(ngModel)]="correo"
                    name="correo"
                    required>
                </div>
              </div>

              <div class="mb-4">
                <div class="d-flex justify-content-between align-items-center mb-1">
                  <label class="form-label custom-label mb-0">Contraseña</label>
                </div>
                <div class="input-group-custom">
                  <input
                    type="password"
                    class="form-control custom-input"
                    placeholder="••••••••"
                    [(ngModel)]="password"
                    name="password"
                    required>
                </div>
              </div>

              <button
                type="submit"
                class="btn btn-git-primary w-100 fw-semibold py-2 d-flex align-items-center justify-content-center gap-2">
                <span>Ingresar al sistema</span>
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" viewBox="0 0 16 16">
                  <path fill-rule="evenodd" d="M1 8a.5.5 0 0 1 .5-.5h11.793l-3.147-3.146a.5.5 0 0 1 .708-.708l4 4a.5.5 0 0 1 0 .708l4-4a.5.5 0 0 1-.708-.708L13.293 7.5H1.5A.5.5 0 0 1 1 8z"/>
                </svg>
              </button>

            </form>

          </div>
        </div>
        
        <p class="text-center text-muted small mt-4">Protected by JWT & Spring Security</p>

      </div>
    </div>
  </div>
</div>
